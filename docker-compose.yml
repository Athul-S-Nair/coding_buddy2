version: '3.9'

services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:16.0
    env_file: judge0.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    restart: always

  redis:
    image: redis:7.2.1
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "YourSecretRedisPassword1234"
      ]
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:
